name: Build Windows server executable

# Fires on every pushed release tag (v*.*.*) so the Windows server zip
# auto-attaches to the GitHub release. Also exposes a manual trigger
# from the Actions tab so we can test the build without cutting a tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[browser]" pyinstaller

      - name: Build rtplot-server.exe
        run: pyinstaller packaging/rtplot-server.spec --noconfirm

      - name: Derive version label
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $version = $env:GITHUB_REF_NAME -replace "^v", ""
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0,7))"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Building rtplot-server $version"

      - name: Package onedir output as zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $zipName = "rtplot-server-$version-windows-x64.zip"
          Compress-Archive -Path dist/rtplot-server -DestinationPath "dist/$zipName"
          echo "Produced dist/$zipName"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtplot-server-windows
          path: dist/rtplot-server-*-windows-x64.zip

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rtplot-server-*-windows-x64.zip
          fail_on_unmatched_files: true
